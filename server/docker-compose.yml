services:
  postgres:
    image: postgres:16-alpine
    container_name: radiant-postgres
    environment:
      POSTGRES_DB: radiant
      POSTGRES_USER: radiant
      POSTGRES_PASSWORD: radiant
    ports:
      - "5432:5432"
    volumes:
      - ../db_data/postgres:/var/lib/postgresql/data
    networks:
      - radiant-network

  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: radiant-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://radiant:radiant@postgres:5432/radiant
    depends_on:
      - postgres
    volumes:
      - ../db_server:/app/db_server
      - .:/app/server
      - ../tests:/app/tests
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
