services:
  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: radiant-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SQLITE_DB_PATH: /app/db_data/dental_clinic.sqlite
    volumes:
      - ../db_data/sqlite:/app/db_data
      - ../db_server:/app/db_server
      - .:/app/server
      - ../tests:/app/tests
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
