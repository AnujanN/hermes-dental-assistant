services:
  db_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radiant-db-server
    env_file:
      - .env
    environment:
      SQLITE_DB_PATH: /app/db_data/dental_clinic.sqlite
    volumes:
      - ../db_data/sqlite:/app/db_data
      - .:/app
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
