version: '3.8'

services:

  # 2. Database & RAG Initializer
  db_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radiant-db-server
    env_file:
      - .env
    volumes:
      - ../db_data/sqlite:/app/db_data
      - .:/app
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
