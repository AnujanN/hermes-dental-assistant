services:
  postgres:
    image: postgres:16-alpine
    container_name: radiant-postgres
    environment:
      POSTGRES_DB: radiant
      POSTGRES_USER: radiant
      POSTGRES_PASSWORD: radiant
    ports:
      - "5432:5432"
    volumes:
      - ../db_data/postgres:/var/lib/postgresql/data
    networks:
      - radiant-network

  db_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radiant-db-server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://radiant:radiant@postgres:5432/radiant
    depends_on:
      - postgres
    volumes:
      - .:/app
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
