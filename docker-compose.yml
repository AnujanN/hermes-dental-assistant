services:
  postgres:
    image: postgres:16-alpine
    container_name: radiant-postgres
    environment:
      POSTGRES_DB: radiant
      POSTGRES_USER: radiant
      POSTGRES_PASSWORD: radiant
    ports:
      - "5432:5432"
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/data
    networks:
      - radiant-network

  db_server:
    build:
      context: ./db_server
      dockerfile: Dockerfile
    container_name: radiant-db-server
    env_file:
      - ./db_server/.env
    environment:
      DATABASE_URL: postgresql://radiant:radiant@postgres:5432/radiant
    depends_on:
      - postgres
    volumes:
      - ./db_server:/app
    networks:
      - radiant-network

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: radiant-backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://radiant:radiant@postgres:5432/radiant
    depends_on:
      - postgres
      - db_server
    volumes:
      - ./db_server:/app/db_server
      - ./server:/app/server
      - ./tests:/app/tests
    networks:
      - radiant-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: radiant-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - radiant-network

networks:
  radiant-network:
    name: radiant-network
    driver: bridge
